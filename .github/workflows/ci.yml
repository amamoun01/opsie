name: CI Quality & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  static-analysis:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Kept at 3.12 to match your target-version in pyproject.toml

      - name: Execute Pre-Commit Hook Suite
        uses: pre-commit/action@v3.0.1

  security-compliance:
    name: DevSecOps Vulnerability Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  automated-testing:
    name: Asynchronous Unit Testing
    needs: [static-analysis, security-compliance] # Ensures code is clean/safe before wasting computing time on tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Speeds up subsequent pipeline runs by caching your pip dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Test Suite via Pytest
        run: pytest -v

  container-verification:
    name: Immutable Image Build Validation
    needs: automated-testing # This now successfully resolves to the job defined right above it!
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Backend Container Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: opsie-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Bot Container Build
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: false
          tags: opsie-bot:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
