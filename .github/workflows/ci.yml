name: CI Quality & Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  static-analysis:
    name: Code Quality & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute Pre-Commit Hook Suite
        uses: pre-commit/action@v3.0.1

  security-compliance:
    name: DevSecOps Vulnerability Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Execute Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  container-verification:
    name: Immutable Image Build Validation
    needs: [static-analysis, security-compliance]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Backend Container Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: opsie-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Bot Container Build
        uses: docker/build-push-action@v5
        with:
          context: ./bot
          push: false
          tags: opsie-bot:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
